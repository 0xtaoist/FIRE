skip-lint = false

[programs.localnet]
batch_auction = "BAuc1111111111111111111111111111111111111111"
fee_router = "FeeR1111111111111111111111111111111111111111"
stake_manager = "Stak1111111111111111111111111111111111111111"
ticker_registry = "Tick1111111111111111111111111111111111111111"
