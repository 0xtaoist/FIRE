[build]
builder = "nixpacks"
buildCommand = "pnpm --filter @prove/common build && pnpm --filter @prove/quest-verifier db:generate && pnpm --filter @prove/quest-verifier build"
watchPatterns = ["services/quest-verifier/**", "packages/common/**", "services/indexer/prisma/schema.prisma"]

[deploy]
startCommand = "cd services/quest-verifier && npx prisma generate --schema ../indexer/prisma/schema.prisma && node dist/index.js"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
numReplicas = 1
